<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="#64748b"/>
    </marker>
    <marker id="arrowDownBlue" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <path d="M0,0 L5,10 L10,0" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">GIS Tile Gateway · 瓦片网关架构</text>
  <text x="400" y="52" text-anchor="middle" fill="#64748b" font-size="11">Cloudflare Workers powered GIS tile reverse proxy | Cloudflare Workers 驱动的 GIS 瓦片代理</text>

  <!-- ===== Layer 1: User ===== -->
  <rect x="320" y="78" width="160" height="50" rx="8" fill="url(#boxBlue)" filter="url(#shadow)"/>
  <text x="400" y="98" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🖥️ QGIS / GIS Software</text>
  <text x="400" y="118" text-anchor="middle" fill="#93c5fd" font-size="9">GIS 软件 / XYZ Tile 客户端</text>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="128" x2="400" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowDownBlue)"/>

  <!-- ===== Layer 2: Auto Entry ===== -->
  <rect x="260" y="152" width="280" height="50" rx="8" fill="url(#boxGreen)" filter="url(#shadow)"/>
  <text x="400" y="172" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🔄 auto-map.YOUR_DOMAIN</text>
  <text x="400" y="192" text-anchor="middle" fill="#bbf7d0" font-size="9">自动选择最快入口节点 / Auto-select fastest entry node</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="202" x2="400" y2="218" stroke="#64748b" stroke-width="2"/>
  <line x1="200" y1="218" x2="600" y2="218" stroke="#64748b" stroke-width="2"/>
  <line x1="200" y1="218" x2="200" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="400" y1="218" x2="400" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="600" y1="218" x2="600" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ===== Layer 3: Entry Nodes ===== -->
  <rect x="115" y="250" width="170" height="50" rx="8" fill="#334155" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">🇭🇰 hk-map.YOUR_DOMAIN</text>
  <text x="200" y="290" text-anchor="middle" fill="#94a3b8" font-size="9">Hong Kong / 香港 · HKG</text>

  <rect x="315" y="250" width="170" height="50" rx="8" fill="#334155" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="270" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">🇯🇵 jp-map.YOUR_DOMAIN</text>
  <text x="400" y="290" text-anchor="middle" fill="#94a3b8" font-size="9">Tokyo / 东京 · NRT</text>

  <rect x="515" y="250" width="170" height="50" rx="8" fill="#334155" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="270" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">🇸🇬 sg-map.YOUR_DOMAIN</text>
  <text x="600" y="290" text-anchor="middle" fill="#94a3b8" font-size="9">Singapore / 新加坡 · SIN</text>

  <!-- Arrow 3→4 -->
  <line x1="200" y1="300" x2="200" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="400" y1="300" x2="400" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="600" y1="300" x2="600" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ===== Layer 4: Worker ===== -->
  <rect x="280" y="332" width="240" height="50" rx="8" fill="url(#boxPurple)" filter="url(#shadow)"/>
  <text x="400" y="352" text-anchor="middle" fill="white" font-size="12" font-weight="bold">⚙️ Cloudflare Workers</text>
  <text x="400" y="372" text-anchor="middle" fill="#c4b5fd" font-size="9">边缘计算 + 缓存 / Edge compute + cache</text>

  <!-- Arrow 4→5 -->
  <line x1="400" y1="382" x2="400" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ===== Layer 5: Cache ===== -->
  <rect x="260" y="412" width="280" height="50" rx="8" fill="url(#boxOrange)" filter="url(#shadow)"/>
  <text x="400" y="432" text-anchor="middle" fill="white" font-size="12" font-weight="bold">💾 缓存层 / Cache Layer</text>
  <text x="400" y="452" text-anchor="middle" fill="#fde68a" font-size="9">内存 → Edge Cache → KV → R2</text>

  <!-- Arrow 5→6 -->
  <line x1="400" y1="462" x2="400" y2="490" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ===== Layer 6: Providers ===== -->
  <rect x="80" y="492" width="140" height="50" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="150" y="512" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">🗺️ Google Maps</text>
  <text x="150" y="532" text-anchor="middle" fill="#60a5fa" font-size="9">卫星 / 矢量 / 地形</text>

  <rect x="240" y="492" width="140" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="512" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="bold">🌍 Esri ArcGIS</text>
  <text x="310" y="532" text-anchor="middle" fill="#4ade80" font-size="9">World Imagery 卫星</text>

  <rect x="400" y="492" width="140" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="470" y="512" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">📍 Bing Maps</text>
  <text x="470" y="532" text-anchor="middle" fill="#60a5fa" font-size="9">Bing 卫星影像</text>

  <rect x="560" y="492" width="160" height="50" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1" filter="url(#shadow)"/>
  <text x="640" y="512" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">🇨🇳 天地图 Tianditu</text>
  <text x="640" y="532" text-anchor="middle" fill="#a78bfa" font-size="9">CGCS2000 坐标系</text>

  <!-- ===== Additional: NASA (bottom) ===== -->
  <rect x="80" y="555" width="140" height="30" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="1"/>
  <text x="150" y="574" text-anchor="middle" fill="#a8a29e" font-size="10">🛰️ NASA MODIS</text>

  <rect x="240" y="555" width="140" height="30" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="1"/>
  <text x="310" y="574" text-anchor="middle" fill="#a8a29e" font-size="10">🗺️ Mapy.cz</text>

  <rect x="400" y="555" width="140" height="30" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="1"/>
  <text x="470" y="574" text-anchor="middle" fill="#a8a29e" font-size="10">🗺️ CartoDB</text>

  <rect x="560" y="555" width="160" height="30" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="1"/>
  <text x="640" y="574" text-anchor="middle" fill="#a8a29e" font-size="10">⛰️ Mapzen 高程地形</text>

  <!-- Footer -->
  <text x="400" y="610" text-anchor="middle" fill="#475569" font-size="9">开源 GIS 瓦片网关 · Open Source GIS Tile Gateway</text>
</svg>